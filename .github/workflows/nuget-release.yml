name: Publish NuGet Package

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --nologo -c Release

      - name: Test
        run: dotnet test --no-build --verbosity normal -c Release

      - name: Pack
        run: dotnet pack src/Ossendorf.Csla.PollingCommand/ --no-build --nologo -o artifacts/ -c Release

      - name: Get NuGet API key (OIDC)
        id: nuget-key
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org');
            core.setSecret(token);
            core.setOutput('api-key', token);

      - name: Publish NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ steps.nuget-key.outputs.api-key }} -s https://api.nuget.org/v3/index.json
